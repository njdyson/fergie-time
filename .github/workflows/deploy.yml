name: Deploy to Server
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 185.230.218.116
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            # Pull latest code
            cd /var/www/vhosts/psybob.uk/ft.psybob.uk
            GIT_TERMINAL_PROMPT=0 git -c credential.helper= fetch https://github.com/njdyson/fergie-time.git main
            git reset --hard FETCH_HEAD

            # Install nvm + node if missing
            export NVM_DIR="$HOME/.nvm"
            if [ ! -s "$NVM_DIR/nvm.sh" ]; then
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
            fi
            source "$NVM_DIR/nvm.sh"
            nvm install 20 || true
            nvm use 20

            # Build
            npm install
            chmod +x node_modules/.bin/* 2>/dev/null || true
            npm run build

            # Start/restart server with pm2
            npm install -g pm2 2>/dev/null || true
            pm2 delete fergie-time 2>/dev/null || true
            PORT=3001 pm2 start npm --name fergie-time -- start
            pm2 save
            sleep 3
            pm2 list
            pm2 logs fergie-time --lines 20 --nostream
