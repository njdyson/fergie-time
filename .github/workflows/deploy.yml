name: Deploy to Server
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 185.230.218.116
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            cd /var/www/vhosts/psybob.uk/ft.psybob.uk
            git remote set-url origin https://github.com/njdyson/fergie-time.git
            git fetch origin
            git reset --hard origin/main
            export PATH="/usr/local/bin:/usr/bin:$PATH"
            which node && node --version || echo "NODE NOT FOUND"
            which npm && npm --version || echo "NPM NOT FOUND"
            npm install
            npm run build
