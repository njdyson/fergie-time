# Fergie Time Football Manager — nginx reverse proxy
#
# Installation:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/fergie-time
#   sudo ln -s /etc/nginx/sites-available/fergie-time /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# For TLS, run certbot after installation:
#   sudo certbot --nginx -d yourdomain.com
#
# Replace server_name with your actual domain or IP.

server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie session support
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;
    }
}
