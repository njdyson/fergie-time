<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fergie Time</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111111;
      }

      #app {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        gap: 8px;
      }

      #match-canvas {
        display: block;
        max-width: 100%;
      }

      #controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }

      .ctrl-btn {
        padding: 5px 14px;
        background: #1e293b;
        color: #cbd5e1;
        border: 1px solid #334155;
        border-radius: 4px;
        font: 13px/1 monospace;
        cursor: pointer;
        user-select: none;
        transition: background 0.1s, color 0.1s;
      }

      .ctrl-btn:hover {
        background: #334155;
        color: #f1f5f9;
      }

      .ctrl-btn:active {
        background: #475569;
      }

      .ctrl-btn.active {
        background: #1e40af;
        color: #bfdbfe;
        border-color: #3b82f6;
      }

      .ctrl-sep {
        width: 1px;
        height: 22px;
        background: #334155;
      }

      #speed-label {
        color: #64748b;
        font: 12px monospace;
        min-width: 40px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="match-canvas"></canvas>
      <div id="controls">
        <button class="ctrl-btn" id="btn-pause" title="Pause / Resume (P)">Pause</button>
        <button class="ctrl-btn" id="btn-reset" title="Reset match">Reset</button>
        <div class="ctrl-sep"></div>
        <button class="ctrl-btn active" id="btn-1x" title="Normal speed (1)">1x</button>
        <button class="ctrl-btn" id="btn-2x" title="2x speed (2)">2x</button>
        <button class="ctrl-btn" id="btn-4x" title="4x speed (3)">4x</button>
        <div class="ctrl-sep"></div>
        <button class="ctrl-btn" id="btn-stats" title="Toggle stats overlay (S)">Stats</button>
        <button class="ctrl-btn" id="btn-debug" title="Toggle debug overlay (D)">Debug</button>
        <button class="ctrl-btn" id="btn-heatmap" title="Toggle heatmap (H)">Heatmap</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
